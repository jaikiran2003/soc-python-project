<div id="game-container">
<div class="flex flex-col min-h-full bg-black">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 bg-black border-b-2 border-accent pixel-border">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="bg-accent text-black text-sm px-3 py-1.5 rounded-xl transition-all duration-150 hover:glow hover:shadow-lg">
            ← Back
        </button>
        <h1 class="font-bold text-accent glow">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-yellow text-sm py-2 px-4 glow">
        Tap a square when you find someone who matches it.
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-winning text-orange text-center py-2 font-semibold text-sm border-b-2 border-accent glow">
        🎉 BINGO! You got a line!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
