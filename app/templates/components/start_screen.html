<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-black">
    <div class="text-center max-w-sm">
        <h1 class="text-4xl font-bold text-yellow mb-2 glow">Soc Ops</h1>
        <p class="text-lg text-green mb-8 glow">Social Bingo</p>

        <div class="bg-black rounded-xl p-6 shadow-xl border-2 border-accent mb-8 pixel-border">
            <h2 class="font-semibold text-orange mb-3 glow">How to play</h2>
            <ul class="text-left text-terminal text-sm space-y-2">
                <li>• Find people who match the questions</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-4 px-8 rounded-xl text-lg transition-all duration-150 hover:glow hover:shadow-xl">
            Start Game
        </button>
    </div>
</div>
</div>
