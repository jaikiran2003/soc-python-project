<div class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-1 text-center border-2 border-accent rounded-xl transition-all duration-150 select-none min-h-[60px] text-xs leading-tight pixel-border
        {%- if square.is_marked %}
            {%- if is_winning %} bg-winning border-accent text-accent glow
            {%- else %} bg-marked border-accent text-secondary glow
            {%- endif %}
        {%- else %} bg-black text-terminal hover:bg-accent active:bg-accent hover:glow
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5 text-accent text-xs glow">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
