<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div class="bg-black rounded-xl p-6 max-w-xs w-full text-center shadow-xl border-2 border-accent pixel-border animate-[bounce_0.5s_ease-out]">
        <div class="text-5xl mb-4 glow text-yellow">🎉</div>
        <h2 class="text-3xl font-bold text-accent mb-2 glow">BINGO!</h2>
        <p class="text-green mb-6 glow">You completed a line!</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-black font-semibold py-3 px-6 rounded-xl transition-all duration-150 hover:glow hover:shadow-lg">
            Keep Playing
        </button>
    </div>
</div>
